name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you did...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Integration Version
      description: Which version of the integration are you using? (e.g. 1.2.6)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide relevant logs from Home Assistant.
      render: shell
